<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Planet Nine Tracker logo">
  <defs>
    <radialGradient id="bg" cx="0.5" cy="0.45" r="0.65">
      <stop offset="0%" stop-color="#1a2150"/>
      <stop offset="100%" stop-color="#050714"/>
    </radialGradient>
    <radialGradient id="p9glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#ffd9a8"/>
      <stop offset="60%" stop-color="#ffb86a"/>
      <stop offset="100%" stop-color="#c97a2e"/>
    </radialGradient>
    <radialGradient id="sunglow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#fff3b0"/>
      <stop offset="100%" stop-color="#ffd84d"/>
    </radialGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Background stars -->
  <g fill="#ffffff">
    <circle cx="12" cy="14" r="0.6" opacity="0.7"/>
    <circle cx="52" cy="16" r="0.5" opacity="0.6"/>
    <circle cx="18" cy="50" r="0.5" opacity="0.5"/>
    <circle cx="50" cy="49" r="0.7" opacity="0.7"/>
    <circle cx="9" cy="36" r="0.4" opacity="0.5"/>
    <circle cx="55" cy="34" r="0.4" opacity="0.5"/>
  </g>

  <!-- Tilted elliptical orbit (dashed) -->
  <g transform="rotate(-22 32 32)">
    <ellipse cx="32" cy="32" rx="25" ry="10"
             fill="none" stroke="#6a9cff" stroke-width="1.2"
             stroke-dasharray="2.5 2.5" opacity="0.75"/>
  </g>

  <!-- Sun at focus (slightly right of center, on the orbit's major axis) -->
  <circle cx="36" cy="34.5" r="4" fill="url(#sunglow)" opacity="0.35"/>
  <circle cx="36" cy="34.5" r="2.2" fill="url(#sunglow)"/>

  <!-- Planet Nine on the orbit at aphelion (far end, upper-left) -->
  <circle cx="11.5" cy="22" r="6.5" fill="url(#p9glow)" opacity="0.28"/>
  <circle cx="11.5" cy="22" r="3.8" fill="url(#p9glow)"/>

  <!-- Subtle "9" mark in the corner -->
  <text x="52" y="58" text-anchor="middle"
        font-family="ui-monospace, 'SF Mono', Menlo, monospace"
        font-size="10" font-weight="700"
        fill="#ffb86a" opacity="0.85">9</text>
</svg>
